<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HIMAWARI ALL SEASONS LEDGER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sun-yellow: #ffcf33;
            --sun-orange: #ff8c00;
            --night-blue: #0f172a;
            --glass-white: rgba(255, 255, 255, 0.85);
            --text-main: #1f2937;
        }

        /* --- Dark Mode Configuration --- */
        body.dark-mode {
            background-color: var(--night-blue) !important;
            color: #f8fafc;
        }
        .dark-mode .summer-overlay {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.8));
        }
        .dark-mode .text-gray-800, .dark-mode .text-gray-700 { color: #f1f5f9; }
        .dark-mode #summer-mantra { background-color: rgba(255, 140, 0, 0.2); color: #fbbf24; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fff9e6; 
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            transition: all 0.5s ease;
        }

        .summer-overlay {
            min-height: 100vh;
            /* Blur dihapus untuk kejernihan 100% */
            backdrop-filter: none; 
            transition: background 0.5s;
        }

        /* Sun Animations */
        .sun-rotating {
            width: 80px; height: 80px;
            animation: spin 20s linear infinite;
        }

        .card-sun-decor {
            position: absolute;
            bottom: -20px;
            right: -20px;
            width: 120px;
            opacity: 0.3;
            pointer-events: none;
            animation: spin 40s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Falling Elements Container */
        #falling-box {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }

        .falling-item {
            position: absolute;
            animation: summerFall linear forwards;
        }

        @keyframes summerFall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg) translateX(100px); opacity: 0; }
        }

        /* Floating Mascot Style */
        #floating-mascot {
            position: fixed;
            width: 70px;
            height: 70px;
            z-index: 50;
            pointer-events: none;
            transition: all 3s ease-in-out;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #mascot-img {
            width: 100%; height: 100%;
            object-fit: contain;
            animation: floatUpDown 4s ease-in-out infinite;
        }

        @keyframes floatUpDown {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        /* Card with Sharp Background Image (100% Clear) */
        .summer-card-img {
            border-radius: 40px;
            border: 4px solid white;
            box-shadow: 0 20px 45px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* Memaksimalkan kejernihan visual */
            image-rendering: auto; 
            filter: none !important;
        }

        /* Glassmorphism content inside cards - opacity adjusted for better image visibility */
        .card-inner-glass {
            background: rgba(255, 255, 255, 0.65);
            /* Backdrop blur dihapus agar background 100% jelas */
            backdrop-filter: none; 
            -webkit-backdrop-filter: none;
            width: 100%;
            height: 100%;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dark-mode .card-inner-glass {
            background: rgba(15, 23, 42, 0.65);
        }

        .title-font { font-family: 'Fredoka One', cursive; }

        .btn-summer {
            border-radius: 20px; font-weight: 800; color: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-summer:active { transform: scale(0.92); }

        .control-btn {
            background: rgba(255,255,255,0.8); width: 45px; height: 45px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer;
            transition: transform 0.3s;
        }
        .control-btn:active { transform: scale(0.9); }

        /* Pop-up Image Background Support (Sharp) */
        #modal-content-area {
            background-size: cover;
            background-position: center;
            position: relative;
            filter: none;
        }
    </style>
</head>
<body>

    <!-- Audio Control -->
    <div class="fixed top-5 left-5 z-[100] flex gap-2">
        <div class="control-btn" onclick="toggleMusic()">
            <span id="music-icon">🎵</span>
        </div>
    </div>

    <!-- Dark Mode Toggle -->
    <div class="fixed top-5 right-5 z-[100]">
        <div class="control-btn" onclick="toggleDarkMode()">
            <span id="mode-icon">☀️</span>
        </div>
    </div>

    <!-- Background Music - ID & Source fixed -->
    <audio id="bg-music" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- Animation Layer -->
    <div id="falling-box"></div>

    <!-- Floating Mascot Layer -->
    <div id="floating-mascot">
        <img id="mascot-img" src="Semi.png" alt="Mascot" onerror="this.style.display='none'">
    </div>

    <div class="summer-overlay p-6 pt-12 pb-32">
        <div class="max-w-md mx-auto relative z-10">
            
            <!-- Header -->
            <header class="text-center mb-8 flex flex-col items-center">
                <img src="1.png" class="sun-rotating mb-4" alt="Sun" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2698/2698194.png'">
                <h1 class="title-font text-5xl text-gray-800 dark-mode:text-white">
                    Sun<span class="text-orange-500">Ledger</span>
                </h1>
                <div class="mt-4 px-6 w-full">
                    <div id="summer-mantra" class="text-[11px] font-extrabold text-orange-600 italic bg-orange-100/80 px-4 py-3 rounded-2xl uppercase tracking-widest border border-orange-200/50 shadow-sm leading-relaxed text-center">
                        MENGUMPULKAN SEMANGAT...
                    </div>
                </div>
            </header>

            <!-- Card Saldo -->
            <div id="card-saldo" class="summer-card-img mb-8">
                <div class="card-inner-glass">
                    <img src="1.png" class="card-sun-decor" alt="Decor" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2698/2698194.png'">
                    <p class="text-[10px] uppercase font-black tracking-[0.2em] text-orange-500 mb-2">Tabungan Apato 302</p>
                    <div class="title-font text-6xl text-gray-800 dark-mode:text-white drop-shadow-sm relative z-10">
                        <span class="text-3xl text-gray-400 mr-1">¥</span><span id="total-saldo">0</span>
                    </div>
                    <div id="active-period-label" class="mt-4 text-[9px] font-black text-orange-400 uppercase tracking-widest border-t pt-4 border-orange-200/20 w-full text-center">
                        Memuat Musim...
                    </div>
                </div>
            </div>

            <!-- Gudang Lama & Entry Count -->
            <div class="grid grid-cols-2 gap-4 mb-8">
                <button id="btn-gudang" onclick="toggleArchive()" class="summer-card-img h-24 text-[11px] font-black uppercase tracking-widest text-orange-600 shadow-sm active:scale-95 transition-all flex items-center justify-center">
                    <div class="card-inner-glass !p-0 justify-center">📜 Gudang Lama</div>
                </button>
                <div class="bg-white/80 dark-mode:bg-slate-800/80 p-4 rounded-[40px] text-[11px] font-black uppercase tracking-widest text-gray-400 shadow-sm flex items-center justify-center border-4 border-white">
                    Entry: <span id="item-count" class="text-orange-500 ml-2 font-black">00</span>
                </div>
            </div>

            <!-- Input Form -->
            <div id="card-input" class="summer-card-img mb-10">
                <div class="card-inner-glass p-8">
                    <div class="w-full space-y-6">
                        <div>
                            <label class="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-2 block ml-1">Pemetik</label>
                            <select id="input-user" class="w-full bg-white/90 p-4 outline-none text-sm font-bold text-gray-700 rounded-2xl border-2 border-transparent focus:border-yellow-300">
                                <option value="" disabled selected>Siapa...</option>
                                <option value="Putri">1. Putri</option>
                                <option value="Veybe">2. Veybe</option>
                                <option value="Yusi">3. Yusi</option>
                                <option value="Vicky">4. Vicky</option>
                            </select>
                        </div>
                        <input type="text" id="input-ket" class="w-full bg-white/90 p-4 outline-none text-sm font-bold text-gray-700 rounded-2xl uppercase border-2 border-transparent focus:border-yellow-300 shadow-inner" placeholder="KETERANGAN">
                        <input type="number" id="input-nom" class="w-full bg-white/90 p-4 outline-none text-4xl font-black text-gray-800 rounded-2xl border-2 border-transparent focus:border-yellow-300 shadow-inner" placeholder="0">
                        <div class="grid grid-cols-2 gap-4 pt-4">
                            <button id="btn-in" disabled class="btn-summer bg-gradient-to-r from-yellow-400 to-orange-500 py-5 text-[12px] shadow-lg">PANEN / IN</button>
                            <button id="btn-out" disabled class="btn-summer bg-slate-800 py-5 text-[12px] shadow-lg">JUAL / OUT</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Transaction List -->
            <div id="ledger-list" class="space-y-4"></div>
        </div>
    </div>

    <!-- Archive Modal (Sharp Old Warehouse Theme) -->
    <div id="modal-arsip" class="fixed inset-0 bg-black/80 z-[2000] hidden p-4 flex items-center justify-center">
        <div id="modal-content-area" class="w-full max-w-md rounded-[50px] shadow-2xl overflow-hidden border-4 border-white">
            <div class="card-inner-glass !p-8 min-h-[70vh] justify-start bg-white/70">
                <div class="flex justify-between items-center mb-6 w-full">
                    <h2 class="title-font text-2xl text-orange-600">🌻 Arsip Koleksi</h2>
                    <button onclick="toggleArchive()" class="text-4xl text-gray-500 hover:text-orange-500">&times;</button>
                </div>
                <div id="archive-list" class="space-y-4 overflow-y-auto w-full pr-2" style="max-height: 60vh;"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>

    <script>
        const month = new Date().getMonth();
        
        // --- Random Unique Backgrounds (Sharp 100%) ---
        function applyCardBackgrounds() {
            const cards = ['card-saldo', 'card-input', 'btn-gudang'];
            let images = [1, 2, 3, 4, 5, 6, 7, 8];
            
            // Shuffle images array
            for (let i = images.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [images[i], images[j]] = [images[j], images[i]];
            }

            cards.forEach((id, index) => {
                const element = document.getElementById(id);
                if (element) {
                    element.style.backgroundImage = `url('${images[index]}.jpg')`;
                }
            });
            
            // Khusus Background Archive (Gudang Lama)
            const archiveImg = images[cards.length] || 8;
            document.getElementById('modal-content-area').style.backgroundImage = `url('${archiveImg}.jpg')`;
        }
        applyCardBackgrounds();

        // --- Music Control ---
        const audio = document.getElementById('bg-music');
        const musicIcon = document.getElementById('music-icon');
        let isMusicPlaying = false;

        function toggleMusic() {
            if (isMusicPlaying) {
                audio.pause();
                musicIcon.innerText = "🔇";
            } else {
                // Mencoba memutar audio, menangani kebijakan browser
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(_ => {
                        musicIcon.innerText = "🎵";
                    }).catch(error => {
                        console.log("Autoplay dicegah, klik manual diperlukan.");
                    });
                }
            }
            isMusicPlaying = !isMusicPlaying;
        }

        // --- Mascot ---
        const getMascotFile = () => {
            if (month >= 2 && month <= 4) return "Semi.png";
            if (month >= 5 && month <= 7) return "Panas.png";
            if (month >= 8 && month <= 10) return "Gugur.png";
            return "Salju.png";
        };
        document.getElementById('mascot-img').src = getMascotFile();
        const mascot = document.getElementById('floating-mascot');
        function moveMascot() {
            const maxX = window.innerWidth - 80;
            const maxY = window.innerHeight - 80;
            mascot.style.left = Math.floor(Math.random() * maxX) + 'px';
            mascot.style.top = Math.floor(Math.random() * maxY) + 'px';
        }
        setInterval(moveMascot, 5000); moveMascot();

        // --- Mantras ---
        const getSeasonalMantra = () => {
            const seasons = {
                spring: ["Musim semi tiba, semangat baru di Apato 302! 🌸", "Sakura mekar, saldo pun harus ikut mekar! ✨", "Awal yang cerah untuk tabungan kita! 🌱", "Ganbatte! Seperti kuncup bunga yang tumbuh! 🌷", "Mari menabung seindah bunga sakura! 🌸"],
                summer: ["Matahari terik, semangat panen harus nyentrik! ☀️", "Summer vibes, saldo vibes! Ayo semangat! 🌊", "Panasnya matahari kalah sama semangat Apato 302! 🔥", "Jangan lupa minum air dan isi terus saldonya! 🥤", "Matahari cerah, tabungan melimpah! ✨"],
                autumn: ["Daun maple gugur, tabungan tetap subur! 🍁", "Udara sejuk, hati tenang, saldo kenyang! 🍂", "Musim gugur adalah waktu tepat untuk menabung! 🌾", "Nikmati senja, syukuri setiap yen yang ada! 🌇", "Maple merah, masa depan cerah! 🍁"],
                winter: ["Salju turun, semangat jangan ikut turun! ❄️", "Dingin di luar, hangat di dalam (karena saldo)! 🧤", "Persiapan akhir tahun, perkuat tabungan! ⛄", "Malam panjang, rencana besar, saldo lancar! 🌙", "Kilau salju seindah kilau koin yen! ❄️"]
            };
            let s = (month >= 2 && month <= 4) ? seasons.spring : (month >= 5 && month <= 7) ? seasons.summer : (month >= 8 && month <= 10) ? seasons.autumn : seasons.winter;
            return s[Math.floor(Math.random() * s.length)];
        };
        document.getElementById('summer-mantra').innerText = getSeasonalMantra();

        // --- Dark Mode ---
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('mode-icon').innerText = isDark ? '🌙' : '☀️';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') toggleDarkMode();

        // --- Falling Elements ---
        function createFallingItem() {
            const box = document.getElementById('falling-box');
            const item = document.createElement('div');
            item.className = 'falling-item';
            const size = Math.random() * 12 + 10;
            item.style.width = size + 'px'; item.style.height = size + 'px';
            item.style.left = Math.random() * 100 + 'vw';
            item.style.animationDuration = (Math.random() * 5 + 6) + 's';
            
            if (month >= 2 && month <= 4) { item.style.backgroundColor = '#fbcfe8'; item.style.borderRadius = '50% 0'; } 
            else if (month >= 5 && month <= 7) { item.style.backgroundColor = '#facc15'; item.style.borderRadius = '50%'; } 
            else if (month >= 8 && month <= 10) { item.style.backgroundColor = '#ea580c'; item.style.borderRadius = '0 50%'; } 
            else { item.style.backgroundColor = '#f8fafc'; item.style.borderRadius = '50%'; }
            
            box.appendChild(item);
            setTimeout(() => item.remove(), 10000);
        }
        setInterval(createFallingItem, 800);

        // --- Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSyAiMAg6_CsXal5g_EXLbgoQ35VIboSRJ4A",
            authDomain: "kas-ac289.firebaseapp.com",
            databaseURL: "https://kas-ac289-default-rtdb.firebaseio.com",
            projectId: "kas-ac289",
            storageBucket: "kas-ac289.firebasestorage.app",
            messagingSenderId: "341907599331",
            appId: "1:341907599331:web:35f1d7e63014899a4abad6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const path = 'summer_sunflower_ledger';

        function getPeriodRange() {
            const now = new Date();
            let s, e;
            if (now.getDate() >= 16) {
                s = new Date(now.getFullYear(), now.getMonth(), 16);
                e = new Date(now.getFullYear(), now.getMonth() + 1, 15);
            } else {
                s = new Date(now.getFullYear(), now.getMonth() - 1, 16);
                e = new Date(now.getFullYear(), now.getMonth(), 15);
            }
            return { start: s.getTime(), end: e.getTime(), label: `${s.getDate()} ${s.toLocaleDateString('id-ID', {month:'short'})} - ${e.getDate()} ${e.toLocaleDateString('id-ID', {month:'short'})}` };
        }
        const range = getPeriodRange();
        document.getElementById('active-period-label').innerText = range.label;

        firebase.auth().onAuthStateChanged(u => {
            if(u) {
                document.getElementById('btn-in').disabled = false;
                document.getElementById('btn-out').disabled = false;
                load();
            } else { firebase.auth().signInAnonymously(); }
        });

        function send(type) {
            const u = document.getElementById('input-user').value;
            const k = document.getElementById('input-ket').value;
            const n = document.getElementById('input-nom').value;
            if(!u || !k || !n) return;
            db.ref(path).push({ user: u, desc: k.toUpperCase(), amt: parseInt(n), type, ts: firebase.database.ServerValue.TIMESTAMP });
            document.getElementById('input-ket').value = ""; document.getElementById('input-nom').value = "";
        }
        document.getElementById('btn-in').onclick = () => send('masuk');
        document.getElementById('btn-out').onclick = () => send('keluar');

        function toggleArchive() { 
            const modal = document.getElementById('modal-arsip');
            modal.classList.toggle('hidden'); 
            if(!modal.classList.contains('hidden')) {
                // Berikan gambar gudang random dari pool gambar saat dibuka
                const images = [1, 2, 3, 4, 5, 6, 7, 8];
                const rand = images[Math.floor(Math.random() * images.length)];
                document.getElementById('modal-content-area').style.backgroundImage = `url('${rand}.jpg')`;
            }
        }

        let currentTotal = 0;
        function load() {
            db.ref(path).on('value', snap => {
                const list = document.getElementById('ledger-list');
                const arch = document.getElementById('archive-list');
                const totalEl = document.getElementById('total-saldo');
                list.innerHTML = ""; arch.innerHTML = "";
                let t = 0, c = 0;
                const data = snap.val();
                if(!data) { totalEl.innerText = "0"; return; }

                const items = Object.keys(data).map(k => ({id:k, ...data[k]})).sort((a,b) => b.ts - a.ts);
                items.forEach(item => {
                    const isInc = item.type === 'masuk';
                    const isActive = item.ts >= range.start && item.ts <= range.end;
                    const html = `
                        <div class="bg-white/90 dark-mode:bg-slate-800/90 p-6 flex justify-between items-center rounded-[35px] shadow-sm border-b-4 border-orange-100 dark-mode:border-slate-700">
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[8px] bg-orange-100 text-orange-600 px-2 py-0.5 rounded-full font-black">${item.user}</span>
                                    <h4 class="text-[12px] font-extrabold text-gray-700 dark-mode:text-slate-100 uppercase">${item.desc}</h4>
                                </div>
                                <p class="text-[9px] text-gray-300 font-bold uppercase">${new Date(item.ts).toLocaleDateString('id-ID', {day:'numeric', month:'short'})}</p>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="text-xl font-black ${isInc ? 'text-green-500' : 'text-orange-500'}">¥${item.amt.toLocaleString()}</span>
                                ${isActive ? `<button onclick="del('${item.id}')" class="text-gray-200 hover:text-red-400 text-2xl">&times;</button>` : ''}
                            </div>
                        </div>`;
                    if(isActive) { t += isInc ? item.amt : -item.amt; c++; list.insertAdjacentHTML('beforeend', html); }
                    else { arch.insertAdjacentHTML('beforeend', html); }
                });
                totalEl.innerText = t.toLocaleString();
                document.getElementById('item-count').innerText = c < 10 ? "0" + c : c;
            });
        }
        window.del = (id) => confirm("Hapus data ini?") && db.ref(path).child(id).remove();
    </script>
</body>
</html>
